query ScenarioDetail($scenarioId: ID!, $version: Int!) {
  scenario(scenarioId: $scenarioId, version: $version) {
    scenarioId
    version
    title
    status
    clinicalObjectives
    requiredTraceTags
    review {
      clinical
      psychometric
      legal
      simulationQa
    }
    governance {
      scoreUseLabel
      syntheticCaseDisclosure
      validationStage
      requiredReviewerRoles
      sourceIds
    }
    environment {
      environmentId
      name
      description
    }
    equipment
    actors {
      actorId
      role
      displayName
      demeanor
      communicationProfile {
        styleFamily
        style
        intensity
        baselineMood
        communicativeness
        topicsToAvoid
        adverseResponse
        deescalationTriggers
        escalationTriggers
        culturalLanguageNotes
      }
    }
    assetNeeds {
      assetId
      assetType
      description
      licenseStatus
    }
  }
  assetReadiness(scenarioId: $scenarioId, version: $version) {
    scenarioId
    devReady
    productionReady
    missingRequiredAssetIds
    blockedAssets {
      assetId
      blockers
    }
    productionBlockedAssets {
      assetId
      blockers
    }
    productionReadinessLadder {
      productionReady
      assetCount
      productionReadyAssetIds
      blockedAssetIds
      missingRequiredAssetIds
      blockers
      stationBudget {
        totalTriangles
        totalTextureMegabytes
        totalDrawCalls
        blockers
      }
      assetLadders {
        assetId
        productionReady
        blockers
        steps {
          step
          status
          evidenceRefs
          blockers
        }
      }
    }
  }
}
