query ReviewPacketReplay($stationRunId: ID!) {
  reviewPacket(stationRunId: $stationRunId) {
    stationRunId
    scenarioId
    observedTraceTags
    missingRequiredTraceTags
    lateTraceTags
    unsafeEvents
    timeline {
      sequence
      atSecond
      eventType
      source
      actorId
      tag
      summary
    }
    traceQuality {
      eventCount
      modelGeneratedEventCount
      modelFailedEventCount
      voiceAudioEventCount
      blockedGuardrailCount
      unsafeEventCount
      missingRequiredTraceTagCount
      hasPatientNote
      hasModelProvenance
    }
    patientNote {
      submittedAtSecond
      text
    }
    facultyScoreDraft {
      reviewerId
      status
      comments
    }
  }
  clinicalEventReviewSummary(stationRunId: $stationRunId) {
    stationRunId
    eventCount
    redactedEventCount
    clinicalEventKinds
    traceTags
    statusCounts
    latestAtSecond
    durableStore
    safeForFacultyReview
  }
  reviewReplayReadinessSummary(stationRunId: $stationRunId) {
    stationRunId
    replayEvidenceReady
    facultyReviewSafe
    timelineEntryCount
    traceEventCount
    durableEventCount
    redactedDurableEventCount
    missingRequiredBehaviorCount
    lateBehaviorCount
    safetySignalCount
    blockers
    recommendedNextAction
    replayBoundary
    runtimeVisualEvidenceReplayProjection {
      schemaVersion
      source
      stationRunId
      scenarioId
      reviewedMetadataOnlyCount
      heldMetadataOnlyCount
      acceptedAttachmentRefCount
      runtimeEvidenceRefCount
      visualQaEvidenceRefCount
      acceptedActionIds
      rawPayloadDisplayed
      providerExecutionAllowed
      runtimeExecutionAllowed
      learnerLaunchAllowed
      questEvidenceRefreshAllowed
      productionAssetReadinessClaimed
      clinicalValidityClaimed
      scoringValidityClaimed
      replayEvidenceReady
      blockerIds
      nextActions
      uiXrConsumerOperatorWorkflowSummary {
        schemaVersion
        source
        scenarioId
        acceptedAttachmentRefCount
        runtimeEvidenceRefCount
        visualQaEvidenceRefCount
        targetRoute
        method
        submitBodyRef
        submitPreview {
          route
          bodyRef
          attachmentCount
          actionIds
          inputIds
          localArtifactPaths
          rawPayloadDisplayed
          claimBoundary
        }
        reviewerAction
        preflightChecks
        nextActions
        rawPayloadDisplayed
        providerExecutionAllowed
        runtimeExecutionAllowed
        learnerLaunchAllowed
        questEvidenceRefreshAllowed
        productionAssetReadinessClaimed
        clinicalValidityClaimed
        scoringValidityClaimed
        blockerIds
        claimBoundary
        notEvidenceFor
      }
      claimBoundary
      notEvidenceFor
    }
  }
  traceEvents(stationRunId: $stationRunId) {
    sequence
    eventType
    atSecond
    source
    actorId
    tag
  }
}
