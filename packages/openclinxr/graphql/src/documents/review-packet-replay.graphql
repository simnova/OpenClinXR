query ReviewPacketReplay($stationRunId: ID!) {
  reviewPacket(stationRunId: $stationRunId) {
    stationRunId
    scenarioId
    observedTraceTags
    missingRequiredTraceTags
    lateTraceTags
    unsafeEvents
    timeline {
      sequence
      atSecond
      eventType
      source
      actorId
      tag
      summary
    }
    traceQuality {
      eventCount
      modelGeneratedEventCount
      modelFailedEventCount
      voiceAudioEventCount
      blockedGuardrailCount
      unsafeEventCount
      missingRequiredTraceTagCount
      hasPatientNote
      hasModelProvenance
    }
    patientNote {
      submittedAtSecond
      text
    }
    facultyScoreDraft {
      reviewerId
      status
      comments
    }
  }
  clinicalEventReviewSummary(stationRunId: $stationRunId) {
    stationRunId
    eventCount
    redactedEventCount
    clinicalEventKinds
    traceTags
    statusCounts
    latestAtSecond
    durableStore
    safeForFacultyReview
  }
  reviewReplayReadinessSummary(stationRunId: $stationRunId) {
    stationRunId
    replayEvidenceReady
    facultyReviewSafe
    timelineEntryCount
    traceEventCount
    durableEventCount
    redactedDurableEventCount
    missingRequiredBehaviorCount
    lateBehaviorCount
    safetySignalCount
    blockers
    recommendedNextAction
    replayBoundary
  }
  traceEvents(stationRunId: $stationRunId) {
    sequence
    eventType
    atSecond
    source
    actorId
    tag
  }
}
