mutation CreateStationRunQueueSnapshot($input: CreateStationRunQueueSnapshotInput!) {
  createStationRunQueueSnapshot(input: $input) {
    snapshotId
    createdAt
    reviewerId
    queue {
      blueprintId
      canStartLearnerExam
      breakCheckpoints {
        afterStationOrder
        atSecond
      }
      totalStationTimeSeconds
      summary {
        activationReady
        draftBlocked
        governanceBlocked
        missingScenario
      }
      stationQueue {
        stationOrder
        slotId
        label
        scenarioId
        scenarioVersion
        status
        blockers
        timing {
          stationOrder
          slotId
          label
          doorway {
            startsAtSecond
            endsAtSecond
            durationSeconds
          }
          encounter {
            startsAtSecond
            endsAtSecond
            durationSeconds
          }
          note {
            startsAtSecond
            endsAtSecond
            durationSeconds
          }
        }
      }
    }
  }
}
