query ScenarioBank($status: ScenarioStatus) {
  scenarios(status: $status) {
    scenarioId
    version
    title
    status
    clinicalObjectives
    requiredTraceTags
    review {
      clinical
      psychometric
      legal
      simulationQa
    }
    governance {
      scoreUseLabel
      syntheticCaseDisclosure
      validationStage
      requiredReviewerRoles
      sourceIds
    }
    actors {
      actorId
      role
      displayName
      demeanor
      communicationProfile {
        styleFamily
        style
        intensity
        baselineMood
        communicativeness
      }
    }
    assetNeeds {
      assetId
      assetType
      licenseStatus
    }
  }
}
