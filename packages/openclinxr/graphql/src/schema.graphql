scalar JSON

enum ScenarioStatus {
  DRAFT
  READY_FOR_REVIEW
  APPROVED
  ARCHIVED
}

enum ReviewDecision {
  APPROVED
  CHANGES_REQUESTED
}

type Query {
  scenario(scenarioId: ID!, version: Int): Scenario
  scenarios(status: ScenarioStatus): [Scenario!]!
  scenarioReviewDecisions(scenarioId: ID!, version: Int!): [ScenarioReviewDecisionRecord!]!
  examForm(examFormId: ID!): ExamForm
  stationRunQueueSnapshots(blueprintId: ID!): [StationRunQueueSnapshot!]!
  reviewPacket(stationRunId: ID!): ReviewPacket
  clinicalEventReviewSummary(stationRunId: ID!): DurableClinicalEventReviewSummary!
  reviewReplayReadinessSummary(stationRunId: ID!): ReviewReplayReadinessSummary!
  traceEvents(stationRunId: ID!): [TraceEvent!]!
  assetReadiness(scenarioId: ID!, version: Int!): AssetReadiness!
}

type Mutation {
  assembleExamForm(input: AssembleExamFormInput!): ExamForm!
  createStationRunQueueSnapshot(input: CreateStationRunQueueSnapshotInput!): StationRunQueueSnapshot!
  submitScenarioReview(input: ScenarioReviewDecisionInput!): Scenario!
  saveFacultyScoreDraft(input: FacultyScoreDraftInput!): ReviewPacket!
}

type Scenario {
  scenarioId: ID!
  version: Int!
  title: String!
  status: ScenarioStatus!
  clinicalObjectives: [String!]!
  actors: [Actor!]!
  requiredTraceTags: [String!]!
  review: ScenarioReviewState!
  governance: ScenarioGovernance!
  environment: ScenarioEnvironment
  equipment: [String!]!
  assetNeeds: [AssetNeed!]!
}

type Actor {
  actorId: ID!
  role: String!
  displayName: String!
  demeanor: String
  communicationProfile: CommunicationProfile
}

type CommunicationProfile {
  styleFamily: String!
  style: String!
  intensity: Float!
  baselineMood: [String!]!
  communicativeness: String!
  topicsToAvoid: [String!]!
  adverseResponse: String!
  deescalationTriggers: [String!]!
  escalationTriggers: [String!]!
  culturalLanguageNotes: [String!]!
}

type ScenarioReviewState {
  clinical: String!
  psychometric: String!
  legal: String!
  simulationQa: String!
}

type ScenarioReviewDecisionRecord {
  scenarioId: ID!
  version: Int!
  reviewerRole: String!
  reviewerId: ID!
  decision: String!
  comments: String!
  evidenceRefs: [String!]!
  reviewedAt: String!
}

type ScenarioGovernance {
  scoreUseLabel: String!
  syntheticCaseDisclosure: String!
  validationStage: String!
  validationLimitations: [String!]!
  requiredReviewerRoles: [String!]!
  sourceIds: [String!]!
  safetyCriticalTraceTags: [String!]!
  hiddenFactPolicy: HiddenFactPolicy!
}

type HiddenFactPolicy {
  learnerView: String!
  disclosureRequiresTrigger: Boolean!
}

type ScenarioEnvironment {
  environmentId: ID!
  name: String!
  description: String!
}

type AssetNeed {
  assetId: ID!
  assetType: String!
  description: String!
  licenseStatus: String!
}

type AssetReadiness {
  scenarioId: ID!
  devReady: Boolean!
  productionReady: Boolean!
  missingRequiredAssetIds: [ID!]!
  blockedAssets: [AssetBlocker!]!
  productionBlockedAssets: [AssetBlocker!]!
  productionReadinessLadder: ScenarioAssetProductionReadinessLadder!
}

type AssetBlocker {
  assetId: ID!
  blockers: [String!]!
}

type ScenarioAssetProductionReadinessLadder {
  scenarioId: ID!
  productionReady: Boolean!
  assetCount: Int!
  productionReadyAssetIds: [ID!]!
  blockedAssetIds: [ID!]!
  missingRequiredAssetIds: [ID!]!
  blockers: [String!]!
  stationBudget: ScenarioAssetBudget!
  assetLadders: [AssetProductionReadinessLadder!]!
}

type ScenarioAssetBudget {
  maxVisibleTriangles: Int!
  maxTextureMegabytes: Int!
  maxDrawCalls: Int!
  totalTriangles: Int!
  totalTextureMegabytes: Int!
  totalDrawCalls: Int!
  blockers: [String!]!
}

type AssetProductionReadinessLadder {
  assetId: ID!
  scenarioId: ID!
  productionReady: Boolean!
  blockers: [String!]!
  steps: [AssetProductionReadinessStep!]!
}

type AssetProductionReadinessStep {
  step: String!
  status: String!
  evidenceRefs: [String!]!
  blockers: [String!]!
}

type ExamForm {
  examFormId: ID!
  blueprintId: ID!
  status: String!
  stationRefs: [StationRef!]!
  coverage: JSON!
}

type StationRef {
  order: Int!
  scenarioId: ID!
  scenarioVersion: Int!
  title: String!
}

type StationRunQueueSnapshot {
  snapshotId: ID!
  createdAt: String!
  reviewerId: ID
  queue: StationRunQueue!
}

type StationRunQueue {
  blueprintId: ID!
  canStartLearnerExam: Boolean!
  stationQueue: [StationRunQueueItem!]!
  breakCheckpoints: [ExamBreakCheckpoint!]!
  totalStationTimeSeconds: Int!
  summary: StationRunQueueSummary!
}

type StationRunQueueItem {
  stationOrder: Int!
  slotId: ID!
  label: String!
  scenarioId: ID
  scenarioVersion: Int
  status: String!
  blockers: [String!]!
  timing: ExamStationTimingWindow!
}

type ExamStationTimingWindow {
  stationOrder: Int!
  slotId: ID!
  label: String!
  doorway: ExamTimingWindow!
  encounter: ExamTimingWindow!
  note: ExamTimingWindow!
}

type ExamTimingWindow {
  startsAtSecond: Int!
  endsAtSecond: Int!
  durationSeconds: Int!
}

type ExamBreakCheckpoint {
  afterStationOrder: Int!
  atSecond: Int!
}

type StationRunQueueSummary {
  activationReady: Int!
  draftBlocked: Int!
  governanceBlocked: Int!
  missingScenario: Int!
}

type ReviewPacket {
  stationRunId: ID!
  scenarioId: ID!
  observedTraceTags: [String!]!
  missingRequiredTraceTags: [String!]!
  lateTraceTags: [String!]!
  unsafeEvents: [String!]!
  timeline: [TraceTimelineEntry!]!
  traceQuality: ReviewTraceQuality!
  patientNote: PatientNote
  facultyScoreDraft: FacultyScoreDraft!
}

type DurableClinicalEventReviewSummary {
  stationRunId: ID
  eventCount: Int!
  redactedEventCount: Int!
  clinicalEventKinds: JSON!
  traceTags: [String!]!
  statusCounts: JSON!
  latestAtSecond: Int
  durableStore: String
  safeForFacultyReview: Boolean!
}

type ReviewReplayReadinessSummary {
  stationRunId: ID
  replayEvidenceReady: Boolean!
  facultyReviewSafe: Boolean!
  timelineEntryCount: Int!
  traceEventCount: Int!
  durableEventCount: Int!
  redactedDurableEventCount: Int!
  missingRequiredBehaviorCount: Int!
  lateBehaviorCount: Int!
  safetySignalCount: Int!
  blockers: [String!]!
  recommendedNextAction: String!
  replayBoundary: String!
  runtimeVisualEvidenceReplayProjection: RuntimeVisualEvidenceReplayProjection
}

type RuntimeVisualEvidenceReplayProjection {
  schemaVersion: String!
  source: String!
  stationRunId: ID!
  scenarioId: ID!
  reviewedMetadataOnlyCount: Int!
  heldMetadataOnlyCount: Int!
  acceptedAttachmentRefCount: Int!
  runtimeEvidenceRefCount: Int!
  visualQaEvidenceRefCount: Int!
  acceptedActionIds: [String!]!
  rawPayloadDisplayed: Boolean!
  providerExecutionAllowed: Boolean!
  runtimeExecutionAllowed: Boolean!
  learnerLaunchAllowed: Boolean!
  questEvidenceRefreshAllowed: Boolean!
  productionAssetReadinessClaimed: Boolean!
  clinicalValidityClaimed: Boolean!
  scoringValidityClaimed: Boolean!
  replayEvidenceReady: Boolean!
  blockerIds: [String!]!
  nextActions: [String!]!
  uiXrConsumerOperatorWorkflowSummary: UiXrConsumerOperatorWorkflowSummary
  claimBoundary: String!
  notEvidenceFor: [String!]!
}

type UiXrConsumerOperatorWorkflowSummary {
  schemaVersion: String!
  source: String!
  scenarioId: ID!
  acceptedAttachmentRefCount: Int!
  runtimeEvidenceRefCount: Int!
  visualQaEvidenceRefCount: Int!
  targetRoute: String!
  method: String!
  submitBodyRef: String!
  submitPreview: UiXrConsumerWorkflowSubmitPreview!
  reviewerAction: String!
  preflightChecks: [String!]!
  nextActions: [String!]!
  rawPayloadDisplayed: Boolean!
  providerExecutionAllowed: Boolean!
  runtimeExecutionAllowed: Boolean!
  learnerLaunchAllowed: Boolean!
  questEvidenceRefreshAllowed: Boolean!
  productionAssetReadinessClaimed: Boolean!
  clinicalValidityClaimed: Boolean!
  scoringValidityClaimed: Boolean!
  blockerIds: [String!]!
  claimBoundary: String!
  notEvidenceFor: [String!]!
}

type UiXrConsumerWorkflowSubmitPreview {
  route: String!
  bodyRef: String!
  attachmentCount: Int!
  actionIds: [String!]!
  inputIds: [String!]!
  localArtifactPaths: [String!]!
  rawPayloadDisplayed: Boolean!
  claimBoundary: String!
}

type TraceTimelineEntry {
  sequence: Int!
  atSecond: Int!
  eventType: String!
  source: String!
  actorId: ID
  tag: String
  summary: String!
}

type ReviewTraceQuality {
  eventCount: Int!
  modelGeneratedEventCount: Int!
  modelFailedEventCount: Int!
  voiceAudioEventCount: Int!
  blockedGuardrailCount: Int!
  unsafeEventCount: Int!
  missingRequiredTraceTagCount: Int!
  hasPatientNote: Boolean!
  hasModelProvenance: Boolean!
}

type PatientNote {
  stationRunId: ID!
  submittedAtSecond: Int!
  text: String!
}

type FacultyScoreDraft {
  reviewerId: ID!
  status: String!
  comments: String!
}

type TraceEvent {
  stationRunId: ID!
  sequence: Int!
  eventType: String!
  occurredAt: String!
  atSecond: Int!
  source: String!
  actorId: ID
  tag: String
  """
  Runtime/debug payload only. Faculty/admin review surfaces should use review-safe
  summary projections instead of this raw payload field.
  """
  payload: JSON! @deprecated(reason: "Use review-safe replay summaries for faculty/admin UI; raw payload is not review-safe.")
}

input AssembleExamFormInput {
  examFormId: ID!
  blueprintId: ID
  scenarioIds: [ID!]!
}

input CreateStationRunQueueSnapshotInput {
  snapshotId: ID
  createdAt: String
  reviewerId: ID
}

input ScenarioReviewDecisionInput {
  scenarioId: ID!
  version: Int!
  reviewerRole: String!
  reviewerId: ID!
  decision: ReviewDecision!
  comments: String!
  evidenceRefs: [String!]!
}

input FacultyScoreDraftInput {
  stationRunId: ID!
  reviewerId: ID!
  comments: String!
  rubricScores: JSON!
}
