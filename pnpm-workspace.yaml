packages:
  - "apps/*"
  - "packages/cellix/*"
  - "packages/openclinxr/*"

overrides:
  brace-expansion: "5.0.6"
  fast-uri: "3.1.2"
  hono: "4.12.18"
  ip-address: "10.1.1"
  protobufjs: "8.2.0"
  qs: "6.15.2"
  three: "0.184.0"
  rolldown: "1.0.0-rc.18"
  ws: "8.20.1"

# Emergency security exception: @gltf-transform/cli currently resolves tmp@0.2.7,
# which clears the high-severity tmp advisory before the normal maturity window.
minimumReleaseAgeExclude:
  - "tmp@0.2.7"

allowBuilds:
  esbuild: true
  mongodb-memory-server: true
  protobufjs: true
  sharp: true

peerDependencyRules:
  allowedVersions:
    vite: "8.0.10"
