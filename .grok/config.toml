# Project-scoped Grok configuration for openclinxr
# Augments user ~/.grok/config.toml. Repo-root takes precedence over user for supported sections.
# See https://docs (or ~/.grok/docs/user-guide/05-configuration.md) for full options.
# This config is tuned for the project's heavy agentic workflows (per AGENTS.md, docs/agent-factory/, .agent-factory/, agents/** roles with charters+memory, subagent orchestration, persistent rehydration from snapshots in PROJECT_COORDINATION_INDEX.md etc., monorepo with turbo/pnpm, GitHub ops via grok_com_github MCP, custom skills in .agents/skills/ + lock).

# --- Skills (already set for multi-harness standardization) ---
[skills]
paths = [".agents/skills"]
# The .agents/skills/ (with antd, turborepo + future from skills-lock.json and workflow-skill-policy.md) is the canonical location.
# Other harnesses should point their equivalent "additional skills" at the same dir.

# --- Composer orchestration entrypoint (primary Grok session) ---
# The primary Grok session (Composer / grok-composer-*) is the OpenClaw orchestrator.
# Embody repo role: chief-coordinator. Own rehydrate, lease, slice selection, state updates, integration.
# Do NOT delegate orchestration to subagents; delegate bounded consults and disjoint work only.
# Mapping:
#   explore subagent → chief-coordinator, openclaw-drift-police, gap-attacker (read-only, cheap)
#   plan subagent    → implementation-planning-lead (sequencing)
#   specialists      → asset-pipeline-lead, xr-systems-architect, etc. (disjoint write scopes)
# Token efficiency: keep Composer context lean; push scout/review reads to explore+deepseek-v4-flash.
# Measure: pnpm agent:harness:prove (parses ~/.grok/sessions + ccusage codex where available).

# --- Subagents (coordinator first per AGENTS.md + agents/rules/subagent-protocol.md) ---
[subagents]
enabled = true
# Do NOT set default_model here — it overrides per-type routing (see Grok subagents doc).
# Primary Composer session keeps its own model (e.g. grok-composer-2.5-fast).

[subagents.toggle]
explore = true   # chief-coordinator, openclaw-drift-police, productivity-skeptic consults
plan = true      # implementation-planning-lead sequencing

[subagents.models]
explore = "deepseek-v4-flash"   # cheap read-only coordinator/drift consults
plan = "deepseek-v4-pro"        # bounded planning slices
# grok-tier-routing: tier 1 scout / tier 2 plan ladder — see agents/rules/grok-tier-routing.md
# CLI: pnpm grok:tier:introspect | grok:tier:work-order | grok:tier:check
# Never use Cursor Task for read-only scouts; use spawn_subagent explore instead.

# Direct DeepSeek + Moonbridge as backup (user ~/.grok/config.toml)
#
# Preference hierarchy (updated so Moonbridge is explicitly the backup):
# 1. grok-build (strongest frontier / default for high-stakes or implementation judgment)
# 2. Direct DeepSeek (the "these" we tested and enabled):
#    - v4-pro (strong direct, excellent reasoning via thinking mode + reasoning_content)
#    - v4-flash (fast/cheap direct, still strong with thinking)
#    - Anthropic messages variant (for native thinking blocks / Messages shape)
#    - FIM beta (for code fill-in-the-middle scenarios, e.g. external tools)
#    All now reliably usable in the agent (key visible to run_terminal_command; curls for
#    thinking, multi-round, FIM, Anthropic format all succeeded).
# 3. deepseek-via-moon (Moonbridge local bridge) — BACKUP / fallback only.
#
# Moonbridge (local bridge, still the sanctioned one for the repo):
# - http://127.0.0.1:38440/v1 + /responses
# - Exposed as the swappable ModelAssistProvider for bounded first-pass reviews
#   (tools/openclinxr/evidence/model-assist-provider.ts, pnpm local:moonbridge:*).
# - Moonbridge is NOT a Grok subagent routing target when direct DeepSeek is available.
#   It is Codex Desktop-only optional assist (Codex cannot select DeepSeek in the model
#   picker) and a generic production-pipeline ModelAssistProvider option for bounded
#   agentic evaluation/optimization behind explicit gates.
# - Per AUTONOMOUS_WORK_PLAN + worker matrix: upgrade to frontier/direct models for
#   implementation or protected-claim judgment. Grok prefers direct DeepSeek or grok-build.
#
# Direct DeepSeek (official API):
# - v4-pro / v4-flash via chat_completions (https://api.deepseek.com) — primary direct.
# - Anthropic messages (https://api.deepseek.com/anthropic) — secondary.
# - FIM via /beta (https://api.deepseek.com/beta) — for code completion.
# - Full thinking mode, multi-turn, tools, 1M context.
# - See the user's ~/.grok/config.toml for the current entries, subagent routing,
#   and the curl tests that validated them.
#
# Key hygiene (never let the secret appear in anything that goes to GitHub):
# - ALWAYS use `env_key = "DEEPSEEK_API_KEY"` (or OPENCLINXR_DEEPSEEK_API_KEY)
#   in [model.*] sections. Never put the literal "sk-..." value in any .toml.
# - Set the real value only in your personal environment (direnv + .envrc is ideal
#   and already aligns with Grok's load_envrc support).
# - The project's .grok/config.toml contains only comments + env_key examples.
# - Your personal ~/.grok/config.toml lives in /Users/you/.grok/ — it is not
#   part of the repo.
# - Rotate keys regularly at https://platform.deepseek.com/api_keys.
#
# Usage after setup:
#   grok models
#   /model deepseek-v4-pro   (or deepseek-v4-flash, deepseek, deepseek-v4-pro-anthropic, etc.)
#   grok -m deepseek-v4-pro -p "..."
#   (Moonbridge via-moon is still available as explicit backup.)
#
# Subagent routing example (current in user config):
#   [subagents.models]
#   explore = "deepseek-v4-flash"   # direct fast/cheap + thinking — preferred
#   plan = "deepseek-v4-pro"        # direct strong reasoning (or grok-build)
#   # via-moon only as fallback
#
# This setup gives high-fidelity direct DeepSeek (with full thinking/FIM/multi-turn)
# as the primary "these" options, grok-build for frontier strength, and Moonbridge
# strictly as the backup while preserving its role for the repo's local assist tooling.
# All secrets stay out of source control.
#
# DeepSeek Advanced Usage Hints (from the linked guides):
# - multi_round_chat: Always send the FULL concatenated messages history on every call (stateless).
#   For thinking models: in non-tool turns, prior reasoning_content can be omitted from context (API ignores).
#   In tool-call turns: MUST include full reasoning_content + tool_calls in all subsequent assistant messages.
#   Grok's conversation/subagent history management should append complete assistant messages (use .message or equivalent).
# - kv_cache (Context Caching): Default on. Hits on exact prefix matches (e.g. consistent system + long user content).
#   Use `user_id` (e.g. "openclinxr-explore-peds-v1" or per-case) in requests for KV isolation, privacy, and per-"user" cache buckets (affects hit rate, rate limits, scheduling).
#   Monitor usage.prompt_cache_hit_tokens vs miss_tokens. Structure long contexts (e.g. full case def + history) as reusable prefixes.
# - json_mode: response_format={"type":"json_object"} (if backend supports) + MUST mention "json" + provide concrete example/schema in the prompt.
#   Reasonable max_tokens. Occasional empty content possible — strengthen the "output ONLY the JSON object" instruction.
#   Then json.loads the content. Ideal for structured outputs like review packets, trace tags, or asset manifests.
# - thinking_mode: v4-pro/flash default enabled (reasoning_content + content). Control with thinking={"type":"enabled"} + reasoning_effort="high/max".
#   In thinking: temperature/top_p etc. are ignored. For multi-turn/tool loops follow the rules above.
#   Use in agent prompts: "Think step by step (the model will surface reasoning_content). For final answer...".
#   In Anthropic variant: native thinking blocks via the messages format.
#
# When using these in the harness (subagents, custom prompts, or future direct API tools):
# - Prefer direct chat_completions models (v4-pro for complex, flash for speed) for most agentic work.
# - For JSON-structured agent outputs (e.g. case reviews, handoffs): always use the json_mode prompt pattern on v4-pro.
# - For long-running multi-actor traces or case defs: leverage KV cache with consistent user_id + prefix structure.
# - For code-related (FIM, generation): use the fim entry or chat + FIM-style prompts.
# - In subagent system prompts or agent-loop code: include the relevant instructions from the guides (examples in json, history rules for thinking).
# - The Moonbridge local bridge can proxy many of these if you extend it (it already does responses-style); direct is higher fidelity when the key/env is available.
# Update your personal ~/.grok/config.toml model descriptions or subagent prompts with these patterns for best results. Test small and watch usage/cache stats.

# --- Memory (complements the project's persistent agent memory in agents/**/memory.md, .agent-factory/memory-index.json, rehydration from state files) ---
[memory]
enabled = true

[memory.session]
save_on_end = true

[memory.initial_injection]
enabled = true
min_score = 0.15   # low threshold to inject relevant prior agent memory on rehydration-style sessions

[memory.search]
max_results = 8
min_score = 0.2

[memory.watcher]
enabled = true  # watch .agent-factory/memory-index.json and agents/*/memory.md for external updates (e.g. from pnpm agent:index)

# Role integration: SessionStart hooks (see .grok/hooks/) + agents/rules/agent-consult.md encourage reading specific role memory/charter (chief-coordinator etc) before slices per subagent-protocol and "repo-agent consultation" in AGENTS.md.
# Subagents (explore) can be instructed to consult index + role memory for lens.

# --- Features for large agentic monorepo ---
[features]
codebase_indexing = true   # helps Grok understand packages/, tools/agent-factory/, agents/ roles, docs/agent-factory/, schemas/, sources/ etc.
lsp_tools = true           # useful for TS navigation in the monorepo (apps/, packages/, tools/)

# --- Tool tuning for long autonomous OpenClaw-style / OpenClaw-inspired runs, pnpm/turbo builds, tests, agent:loop ---
[toolset.bash]
timeout_secs = 600         # 10min for pnpm agent:*, pnpm openclaw:*, full verifies, builds
output_byte_limit = 1048576  # 1MB for logs from vitest, turbo, agent traces

# --- MCP: GitHub integration (grok_com_github provides the rich GitHub tools seen in sessions: PRs, issues, code search, push_files, etc.) ---
# Configure explicitly for project so GitHub ops are reliably available in this workspace.
# If the server is special/built-in (grok_com_github), this may register or augment it.
# Use `grok mcp doctor` or `grok mcp list` after to verify.
[mcp_servers.grok_com_github]
# The exact transport/command is typically provided by the connected GitHub integration in the Grok env.
# If it requires explicit setup, use:
# command = "..." 
# args = ["..."]
# env = { GITHUB_TOKEN = "..." }  # prefer env or keychain
# For now, declaring the name helps discovery in project context.
# See also the project's use of GitHub MCP in arena spikes and tools.

# Chrome DevTools MCP is enabled for runtime/browser validation evidence.
# Current npm metadata checked 2026-06-05: chrome-devtools-mcp@1.1.1, Apache-2.0.
# Use pnpm dlx so the workspace stays aligned with the repo package manager.
[mcp_servers.chrome-devtools]
command = "pnpm"
args = ["dlx", "chrome-devtools-mcp@1.1.1", "--headless"]

# Playwright support (Microsoft):
# - CLI (via @playwright/test): the `playwright` command
#   for codegen, test, trace, etc. Use via the bash/terminal tool:
#     pnpm exec playwright codegen ...
#     pnpm run playwright:test
#   This is usually the more token-efficient option.
# - MCP server (@playwright/mcp): exposes structured browser automation tools
#   (navigate, click, screenshot, evaluate, etc.) for agent/tool-calling.
#   Available when you need fine-grained, stateful control that is awkward
#   to express as shell commands.
#
# Token-efficiency rule (per hyper-token-efficient-long-run-practices.md):
#   Try the CLI first in most cases. Escalate to the MCP only when the
#   structured tool surface provides clear value (complex multi-step flows,
#   heavy interaction with page state, etc.).
#
# Use pnpm dlx for the MCP and pnpm exec for the CLI to stay consistent
# with the monorepo. @playwright/test is the recommended package (CLI + test
# runner). The old `playwright-cli` standalone is deprecated.
[mcp_servers.playwright]
command = "pnpm"
args = ["dlx", "@playwright/mcp@0.0.75"]

# Note: @playwright/test is declared in devDependencies so `pnpm exec playwright`
# (the CLI) is reliably available to the agent and scripts.

# --- UI / UX for long agentic sessions (rehydrations, autonomous loops, subagent threads) ---
[ui]
max_thoughts_width = 120
compact_mode = false
permission_mode = "always-approve"  # or "ask" for safety in autonomous work
# simple_mode = true   # toggle based on preference for scrollback

# --- Compat (keep scanning other harness files for skills/rules/AGENTS.md/hooks if you switch harnesses; see 05-configuration.md) ---
[compat.cursor]
agents = true
rules = true
skills = true
hooks = true
mcps = true
[compat.claude]
agents = true
rules = true
skills = true
hooks = true
mcps = true

# --- Notifications for unattended/autonomous runs (turn_complete for event-driven slice runner, approval during long slices) ---
[ui.notifications]
method = "auto"
condition = "unfocused"
events = ["turn_complete", "approval_required"]
sleep_prevention = true
progress_bar = true

# --- Plugins (project .grok/plugins/ for bundled hooks/MCP/LSP/skills/agents; see 09-plugins.md) ---
[plugins]
# paths = [".grok/plugins"]  # default discovery includes .grok/plugins/ for team-shared automation
# Example plugin for post-slice + guard automation lives in .grok/plugins/openclinxr-automation/

# Notes:
# - After changing this file, restart the Grok session or use relevant commands for reload.
# - Use `grok inspect` (or grok inspect --json) to verify resolved config, skills, subagents, MCPs, memory, etc. in this workspace.
# - Aligns with AGENTS.md resume sequence (re-read state files first), subagent rules, anti-toil, drift guards (pnpm agent:alignment + docs:drift-check after edits), lease for edits, focused verification.
# - For full standardization across harnesses, keep .agents/skills/ + skills-lock.json as source of truth and configure each harness similarly.

# --- Rules / Project Instructions (modular alternative or complement to giant AGENTS.md) ---
# Grok natively scans:
#   - AGENTS.md (and variants) from repo root down to CWD (accumulating; deeper wins)
#   - *.md files in .grok/rules/ (always), .claude/rules/, .cursor/rules/ (compat)
#
# To avoid dumping everything into AGENTS.md, we use a structured approach parallel to skills:
# - Canonical source: agents/rules/ (non-dot, aligns with project's agents/ role definitions and internal agent system)
# - Grok discovery: symlinks in .grok/rules/ (and .claude/.cursor for other harnesses)
#
# This is better for AgenticEx: modular, focused instructions are easier for agents to follow,
# easier to maintain, and supports the "targeted reads/patches, no chat summaries" + source-of-truth order.
#
# See agents/rules/README.md for details and the specific rule files (rehydration-low-token, subagent-protocol, drift-toil-prevention, etc.).
# Update AGENTS.md high-level sections to reference these as needed.
# The project's custom agents (in agents/** and tools/agent-factory/) can/should also load from agents/rules/ for consistency.

# --- Agents / Project-scoped Agent Definitions ---
# Per Grok project rules doc, .grok/agents/ for project-scoped agent definitions.
# The source is agents/** (the 13 active roles with charter.md + memory.md + index.json, plus rules/ for modularity).
# Safe pointers (no full content dup) now in .grok/agents/ for all canonical agents/** roles, generated by scripts/sync-harness-agent-files.sh for first-class subagent discovery/mapping (gap2).
# These point to root agents/<role>/ without duplicating role memory (avoids previous drift/registry issues with full symlinks).
# Grok can be prompted to consult specific role charters/memories using the source-of-truth order + agent-consult.md.
# This + subagents config (explore/plan) amps the "persistent expert team" and "repo-agent consultation" from AGENTS.md.
# See .grok/agents/README.md and gaps doc for full 1-7 execution.

# --- Hooks (lifecycle automation for AgenticEx) ---
# Project hooks in .grok/hooks/*.json (trusted on first use via /hooks or Ctrl+L).
# The example post-coord-edit-guards.json provides reminders on PostToolUse (after edits to coord files) to run guards,
# and PreCompact reminders for rehydration.
# This automates the "after edits to coordination files, always run pnpm agent:alignment && pnpm docs:drift-check" rule.
# See .grok/hooks/ (synced to compat locations). Customize for auto-running guards, lease checks, etc.
# Full events and format in Grok hooks doc.
