# Project-scoped Codex configuration for OpenClinXR.
# This repo uses an OpenClaw-style / OpenClaw-inspired workflow, not an external OpenClaw runtime.

project_doc_max_bytes = 65536
approval_policy = "on-request"

[features]
hooks = true
multi_agent = true

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[mcp_servers.chrome-devtools]
command = "pnpm"
args = ["dlx", "chrome-devtools-mcp@1.1.1", "--headless"]
